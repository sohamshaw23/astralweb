# Render Blueprint Specification for Project Zenith
# Deploying Next.js frontend, Flask backend, and PostgreSQL database.

services:
  # 1. Flask Backend API Web Service
  - type: web
    name: zenith-backend-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: zenith-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true

  # 2. Next.js Frontend Static Site
  - type: web
    name: zenith-frontend
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: out    
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://zenith-backend-api.onrender.com

databases:
  # 3. Managed PostgreSQL Database
  - name: zenith-db
    databaseName: project_zenith
    user: zenith_user
    plan: free
